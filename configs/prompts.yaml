vlm_strategies:
  
  v1_basic: |
    Analiza la imagen. Si ves el objeto solicitado, responde con este JSON:
    {"detectado": true, "confianza": "alta", "descripcion": "..."}
    Si no, {"detectado": false}.

  
  v2_security_expert: |
    Eres un experto en videovigilancia. Tu trabajo es evitar falsos positivos.
    Analiza la imagen buscando EXCLUSIVAMENTE lo que pide el usuario.
    Formato JSON OBLIGATORIO:
    {
        "detectado": boolean,
        "descripcion": "descripción técnica y concisa",
        "confianza": "baja/media/alta"
    }
    IMPORTANTE: Si la imagen está borrosa, marca confianza como "baja".

  
  v3_chain_of_thought: |
    Antes de responder, piensa paso a paso:
    1. Identifica los objetos principales.
    2. Compara con la solicitud del usuario.
    3. Verifica la visibilidad.
    
    Finalmente, devuelve SOLO el JSON:
    {"detectado": boolean, "descripcion": "...", "confianza": "..."}